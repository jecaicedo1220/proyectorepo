<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JellySpa - Recuperar contrasena</title>
  <link rel="stylesheet" href="css/stilos.css">
</head>
<body>
  <header>
    <nav>
      <h2>JellySpa</h2>
      <div class="nav-links">
        <a class="nav-button nav-secondary" href="Index.html">Inicio</a>
        <a class="nav-button nav-primary" href="login.html">Iniciar sesion</a>
      </div>
    </nav>
  </header>

  <main class="form-page">
    <section class="form-card">
      <h1>Recuperar contrasena</h1>
      <p>Escribe tu correo y crea una nueva contrasena para volver a entrar.</p>
      <form id="recuperarForm">
        <label for="correo">Correo electronico</label>
        <input id="correo" type="email" placeholder="tu@correo.com" required>

        <label for="password">Nueva contrasena</label>
        <input id="password" type="password" placeholder="Nueva contrasena" minlength="8" maxlength="72" required>

        <label for="confirmarPassword">Confirmar contrasena</label>
        <input id="confirmarPassword" type="password" placeholder="Repite la contrasena" minlength="8" maxlength="72" required>

        <button type="submit" class="btn btn-primary">Cambiar contrasena</button>
      </form>
      <p class="form-footer">
        Ya la recordaste? <a href="login.html">Inicia sesion</a>
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <p>2026 JellySpa. Tu estilo, tu brillo.</p>
  </footer>
  <a class="whatsapp-float" href="https://wa.me/573206479635" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp">WhatsApp</a>

  <script src="css/js/api.js"></script>
  <script src="css/js/recuperar.js"></script>
</body>
</html>
